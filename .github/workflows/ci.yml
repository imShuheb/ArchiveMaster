name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            sep: ';'
            artifact_name: ArchiveMaster-Windows
            pre_install: ''
          - os: ubuntu-latest
            sep: ':'
            artifact_name: ArchiveMaster-Linux
            pre_install: 'sudo apt-get update && sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0'

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux System Dependencies
      if: matrix.pre_install != ''
      run: ${{ matrix.pre_install }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --hidden-import clr --hidden-import win32timezone --hidden-import PIL --hidden-import PIL.ExifTags --add-data "gui${{ matrix.sep }}gui/" --name "ArchiveMaster" app.py

    - name: Build Windows Installer (Inno Setup)
      if: matrix.os == 'windows-latest'
      run: iscc installer.iss

    - name: Zip Portable App (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path dist\ArchiveMaster -DestinationPath dist\ArchiveMaster-Windows-Portable.zip

    - name: Compress Portable App (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czvf dist/ArchiveMaster-Linux-Portable.tar.gz -C dist ArchiveMaster

    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}-Portable
        path: dist/*Portable*

    - name: Upload Windows Installer Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ArchiveMaster-Windows-Installer
        path: dist/ArchiveMaster_Setup.exe

  release_and_deploy_docs:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false

      - name: Configure Git Credentials for Docs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python for Docs
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Deploy MkDocs Website
        run: |
          pip install mkdocs-material
          mkdocs gh-deploy --force
